receivers:
  prometheus:
    config:
      scrape_configs:
        - job_name: "5g_dataset_metrics"
          static_configs:
            - targets: ["host.docker.internal:8000"]  # Python metrics server

exporters:
  prometheus:
    endpoint: "0.0.0.0:8889"

service:
  pipelines:
    metrics:
      receivers: [prometheus]
      exporters: [prometheus]